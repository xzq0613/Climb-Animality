<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>探索你的攀岩灵魂｜你是岩馆里的哪种动物</title>
  <meta name="description" content="20题攀岩动物原型测试，基于动作偏好与行为取向，输出你的主倾向与负倾向。" />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --line: #ece7df;
      --line-strong: #ded5c7;
      --text: #1f1a17;
      --muted: #76695e;
      --accent: #c95a1d;
      --accent-soft: #f6a259;
      --shadow: 0 10px 30px rgba(80, 52, 22, 0.06);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body { font-family: Inter, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; line-height: 1.6; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 34px 18px 64px; }
    .hero, .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .hero { text-align: center; padding: 52px 28px 42px; }
    .hero h1 { margin: 0; font-size: clamp(24px, 4vw, 38px); line-height: 1.2; font-weight: 800; letter-spacing: -0.03em; }
    .hero .line2 { display: block; margin-top: 8px; background: linear-gradient(90deg, #b84912 0%, #e87d2b 50%, #f6b067 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .hero p { max-width: 620px; margin: 18px auto 0; color: var(--muted); font-size: 15px; }
    .cta { margin-top: 26px; display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
    button { appearance: none; border: none; font: inherit; cursor: pointer; transition: transform .18s ease, background .18s ease, border-color .18s ease, opacity .18s ease, box-shadow .18s ease; }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-primary, .btn-secondary { border-radius: 16px; padding: 14px 22px; font-weight: 700; }
    .btn-primary { background: linear-gradient(90deg, #c95a1d 0%, #ef8f39 100%); color: #fff; box-shadow: 0 10px 24px rgba(201,90,29,.18); }
    .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--line-strong); }
    .panel { margin-top: 18px; padding: 26px 22px; }
    .hidden { display: none !important; }
    .progress-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; color: var(--muted); font-size: 14px; }
    .progress-track { margin-top: 12px; height: 8px; background: #f4eee6; border-radius: 999px; overflow: hidden; }
    .progress-bar { height: 100%; width: 0; background: linear-gradient(90deg, #c95a1d 0%, #ef8f39 100%); transition: width .28s ease; border-radius: inherit; }
    .question-shell { margin-top: 24px; position: relative; min-height: 356px; }
    .question-card { border: 1px solid var(--line); border-radius: 22px; padding: 28px 22px 22px; background: #fff; transform: translateX(0); opacity: 1; transition: transform .26s ease, opacity .26s ease; }
    .question-card.leaving { opacity: 0; transform: translateX(-18px); }
    .question-card.entering { opacity: 0; transform: translateX(18px); }
    .question-card.entering.enter-active { opacity: 1; transform: translateX(0); }
    .question-title { margin: 0 0 18px; font-size: clamp(24px, 3vw, 32px); line-height: 1.3; letter-spacing: -0.02em; font-weight: 800; }
    .options { display: grid; gap: 12px; }
    .option { width: 100%; text-align: left; padding: 16px 18px; border-radius: 18px; border: 1px solid var(--line); background: #fff; display: flex; gap: 14px; align-items: flex-start; color: var(--text); }
    .option:hover { border-color: #e8c7ab; box-shadow: 0 8px 20px rgba(201,90,29,.08); }
    .option.active { border-color: #e29652; background: #fff8f3; }
    .option-tag { width: 34px; min-width: 34px; height: 34px; border-radius: 50%; display: grid; place-items: center; background: #fff7f0; color: var(--accent); border: 1px solid #f2d3bb; font-weight: 800; }
    .option-text { font-size: 16px; line-height: 1.5; }
    .nav-row { display: flex; justify-content: space-between; gap: 12px; margin-top: 18px; }
    .result-badge { display: inline-flex; padding: 8px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 13px; color: var(--muted); background: #fff; }
    .result-title { margin: 14px 0 8px; font-size: clamp(30px, 4vw, 42px); line-height: 1.1; letter-spacing: -0.03em; }
    .result-sub { margin: 0; color: var(--muted); font-size: 15px; }
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
    .card { border: 1px solid var(--line); border-radius: 22px; padding: 22px; background: #fff; }
    .card h3 { margin: 0 0 10px; font-size: 18px; }
    .label { display: inline-block; padding: 7px 12px; border-radius: 999px; font-size: 13px; font-weight: 700; background: #fff7f0; color: var(--accent); border: 1px solid #f0d4bc; }
    .animal-name { margin: 14px 0 8px; font-size: 30px; line-height: 1.15; letter-spacing: -0.02em; }
    .animal-meta { color: var(--muted); font-size: 14px; margin-bottom: 14px; }
    .animal-desc { color: #483a31; font-size: 15px; margin: 0; }
    .score-line { margin-top: 16px; font-size: 14px; color: var(--muted); }
    .result-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
    .footer-note { margin-top: 16px; color: #8c7b6d; font-size: 12px; }
    @media (max-width: 720px) {
      .wrap { padding: 22px 14px 42px; }
      .hero { padding: 42px 20px 34px; }
      .panel { padding: 20px 16px; }
      .result-grid { grid-template-columns: 1fr; }
      .question-card { padding: 22px 16px 18px; }
      .option-text { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero" id="introView">
      <h1>
        <span>探索你的攀岩灵魂</span>
        <span class="line2">你是岩馆里的哪种动物</span>
      </h1>
      <p>本测试基于攀岩中的动作偏好与行为取向进行原型归类。它适合做互动风格测试，不等同于严格心理测量。</p>
      <div class="cta">
        <button class="btn-primary" id="startBtn">开始测试</button>
        <button class="btn-secondary" id="viewRuleBtn">查看题型说明</button>
      </div>
    </section>

    <section class="panel hidden" id="quizView">
      <div class="progress-head">
        <div id="progressLabel">第 1 / 20 题</div>
        <div id="progressHint"></div>
      </div>
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="question-shell" id="questionShell"></div>
      <div class="nav-row">
        <button class="btn-secondary" id="prevBtn">上一题</button>
        <button class="btn-secondary" id="restartBtn">重新开始</button>
      </div>
    </section>

    <section class="panel hidden" id="resultView">
      <div class="result-badge">结果已生成</div>
      <h2 class="result-title" id="resultTitle"></h2>
      <p class="result-sub" id="resultSummary"></p>
      <div class="result-grid">
        <div class="card">
          <span class="label">主倾向</span>
          <div class="animal-name" id="primaryName"></div>
          <div class="animal-meta" id="primaryMeta"></div>
          <p class="animal-desc" id="primaryDesc"></p>
          <div class="score-line" id="primaryScoreLine"></div>
        </div>
        <div class="card">
          <span class="label">负倾向</span>
          <div class="animal-name" id="negativeName"></div>
          <div class="animal-meta" id="negativeMeta"></div>
          <p class="animal-desc" id="negativeDesc"></p>
          <div class="score-line" id="negativeScoreLine"></div>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="copyBtn">复制结果摘要</button>
        <button class="btn-secondary" id="retestBtn">再测一次</button>
      </div>
      <div class="footer-note">说明：若最高分并列且给定决胜规则仍无法区分，页面会如实显示“介于两类之间”。</div>
    </section>
  </div>

  <script>
    const CONFIG = {
      analyticsEndpoint: "https://script.google.com/macros/s/AKfycbziDSM4ebxR2YQ0Hrj161XdAOCJ7TYbwZTFBKPZp1Mbu7j5nlKWYtL7bzeYh2Iz1J9t/exec",
      siteName: "climbing-animal-quiz",
      visitCooldownHours: 12
    };

    const ANIMALS = {
      '长臂猿': { key: '长臂猿', subtitle: '静态 / 长臂展 / 站高够点', desc: '你更倾向于用站高、够距与动作经济性解决问题。你不急着飞，而是先把身体摆进最省力的位置。' },
      '雪豹': { key: '雪豹', subtitle: '动态 / 爆发 / 敢飞', desc: '你更相信爆发、节奏与果断执行。只要判断值得冲，你会直接把时机做出来。' },
      '高山灵猫': { key: '高山灵猫', subtitle: '柔韧 / 体位 / 转髋开髋', desc: '你擅长通过体位调整、转髋开髋与身体延展获得更顺的解法，而不是硬碰硬。' },
      '灰熊': { key: '灰熊', subtitle: '力量 / 锁定 / 硬拉硬控', desc: '你更依赖上肢硬实力、锁定能力与直接控制。面对卡点时，你往往先把点抓牢再处理后续。' },
      '岩羊': { key: '岩羊', subtitle: '平衡 / 小脚点 / 重心控制', desc: '你对小脚点、平衡感与重心调度更敏感。别人犹豫的地方，你往往能稳稳站住。' },
      '高山土拨鼠': { key: '高山土拨鼠', subtitle: '社交 / 氛围 / 团爬驱动', desc: '你在团爬环境中的驱动力更强。你不仅在爬，也在带动氛围、吸收外界反馈并与人一起解题。' }
    };

    const QUESTIONS = [
      { id:'Q1', title:'你看一条新线，第一反应是：', options:[{key:'A',text:'这点我能直接够'},{key:'B',text:'这动作能飞'},{key:'C',text:'这脚得站稳'},{key:'D',text:'今天谁也在爬'}] },
      { id:'Q2', title:'难点掉很多次后，你会：', options:[{key:'A',text:'再冲一把'},{key:'B',text:'换个体位'},{key:'C',text:'硬拉再试'},{key:'D',text:'先看别人'}] },
      { id:'Q3', title:'你最顺手的过点方式：', options:[{key:'A',text:'站高一够'},{key:'B',text:'爆发一抓'},{key:'C',text:'转髋送腿'},{key:'D',text:'锁臂拉住'}] },
      { id:'Q4', title:'休息时你更常干什么：', options:[{key:'A',text:'回想脚点路线'},{key:'B',text:'拉伸开髋'},{key:'C',text:'做几下引体'},{key:'D',text:'聊天串场'}] },
      { id:'Q5', title:'朋友最常夸你：', options:[{key:'A',text:'手真长'},{key:'B',text:'身体真软'},{key:'C',text:'脚下真稳'},{key:'D',text:'人缘真好'}] },
      { id:'Q6', title:'来岩馆你最期待：', options:[{key:'A',text:'冲一条飞点线'},{key:'B',text:'解一条平衡线'},{key:'C',text:'和朋友一起玩'},{key:'D',text:'挑战力量线'}] },
      { id:'Q7', title:'看到远点，你第一反应：', options:[{key:'A',text:'先站高'},{key:'B',text:'直接跳'},{key:'C',text:'先转进去'},{key:'D',text:'先找小脚'}] },
      { id:'Q8', title:'你最想加强：', options:[{key:'A',text:'臂展利用'},{key:'B',text:'动态协调'},{key:'C',text:'柔韧高脚'},{key:'D',text:'锁定引体'}] },
      { id:'Q9', title:'你在岩馆最常见的状态：', options:[{key:'A',text:'盯着够点研究'},{key:'B',text:'对着飞点反复冲'},{key:'C',text:'抠小脚找平衡'},{key:'D',text:'一边爬一边聊天'}] },
      { id:'Q10', title:'overhang 卡住时，你更可能：', options:[{key:'A',text:'先锁住再想'},{key:'B',text:'一把爆发过去'},{key:'C',text:'想办法少做一手'},{key:'D',text:'叫朋友一起看'}] },
      { id:'Q11', title:'你给朋友的第一句建议通常是：', options:[{key:'A',text:'再站高点'},{key:'B',text:'先转个髋'},{key:'C',text:'先稳脚下'},{key:'D',text:'大胆冲一下'}] },
      { id:'Q12', title:'大家都在 slab 打滑时，你通常：', options:[{key:'A',text:'慢慢压重心'},{key:'B',text:'高抬腿贴墙'},{key:'C',text:'靠手硬做'},{key:'D',text:'边爬边活跃气氛'}] },
      { id:'Q13', title:'你最常用的省力方式：', options:[{key:'A',text:'站高够点'},{key:'B',text:'拉开体位'},{key:'C',text:'小动态切过去'},{key:'D',text:'锁臂顶过去'}] },
      { id:'Q14', title:'团爬时你更像：', options:[{key:'A',text:'带气氛的人'},{key:'B',text:'第一个冲飞点的人'},{key:'C',text:'专门抠体位的人'},{key:'D',text:'专门抠脚点的人'}] },
      { id:'Q15', title:'别人最可能怎么评价你：', options:[{key:'A',text:'点一抓就不掉'},{key:'B',text:'一站就够到'},{key:'C',text:'你认识的人真多'},{key:'D',text:'小点也敢站'}] },
      { id:'Q16', title:'看到岩馆活动通知，你第一反应：', options:[{key:'A',text:'先报名'},{key:'B',text:'看有没有动态线'},{key:'C',text:'看有没有平衡线'},{key:'D',text:'看有没有力量线'}] },
      { id:'Q17', title:'状态一般时，你更会依赖：', options:[{key:'A',text:'动作经济性'},{key:'B',text:'重心和脚感'},{key:'C',text:'朋友带状态'},{key:'D',text:'上肢硬实力'}] },
      { id:'Q18', title:'手点一般但能抓住时，你更可能：', options:[{key:'A',text:'先锁住'},{key:'B',text:'靠体位顺'},{key:'C',text:'快一点切'},{key:'D',text:'先站高'}] },
      { id:'Q19', title:'周末进岩馆，你通常会先：', options:[{key:'A',text:'找朋友打招呼'},{key:'B',text:'挑一条能静态解的线'},{key:'C',text:'找小脚技术线'},{key:'D',text:'看看有没有体位题'}] },
      { id:'Q20', title:'你最想让别人记住你的哪一点：', options:[{key:'A',text:'最会社交'},{key:'B',text:'最敢飞'},{key:'C',text:'最有力量'},{key:'D',text:'最会站小点'}] }
    ];

    const MAPPING = {
      Q1: {A:'长臂猿', B:'雪豹', C:'岩羊', D:'高山土拨鼠'},
      Q2: {A:'雪豹', B:'高山灵猫', C:'灰熊', D:'高山土拨鼠'},
      Q3: {A:'长臂猿', B:'雪豹', C:'高山灵猫', D:'灰熊'},
      Q4: {A:'岩羊', B:'高山灵猫', C:'灰熊', D:'高山土拨鼠'},
      Q5: {A:'长臂猿', B:'高山灵猫', C:'岩羊', D:'高山土拨鼠'},
      Q6: {A:'雪豹', B:'岩羊', C:'高山土拨鼠', D:'灰熊'},
      Q7: {A:'长臂猿', B:'雪豹', C:'高山灵猫', D:'岩羊'},
      Q8: {A:'长臂猿', B:'雪豹', C:'高山灵猫', D:'灰熊'},
      Q9: {A:'长臂猿', B:'雪豹', C:'岩羊', D:'高山土拨鼠'},
      Q10: {A:'灰熊', B:'雪豹', C:'长臂猿', D:'高山土拨鼠'},
      Q11: {A:'长臂猿', B:'高山灵猫', C:'岩羊', D:'雪豹'},
      Q12: {A:'岩羊', B:'高山灵猫', C:'灰熊', D:'高山土拨鼠'},
      Q13: {A:'长臂猿', B:'高山灵猫', C:'雪豹', D:'灰熊'},
      Q14: {A:'高山土拨鼠', B:'雪豹', C:'高山灵猫', D:'岩羊'},
      Q15: {A:'灰熊', B:'长臂猿', C:'高山土拨鼠', D:'岩羊'},
      Q16: {A:'高山土拨鼠', B:'雪豹', C:'岩羊', D:'灰熊'},
      Q17: {A:'长臂猿', B:'岩羊', C:'高山土拨鼠', D:'灰熊'},
      Q18: {A:'灰熊', B:'高山灵猫', C:'雪豹', D:'长臂猿'},
      Q19: {A:'高山土拨鼠', B:'长臂猿', C:'岩羊', D:'高山灵猫'},
      Q20: {A:'高山土拨鼠', B:'雪豹', C:'灰熊', D:'岩羊'}
    };

    const CORE_HITS = {
      '长臂猿': ['Q1A','Q7A','Q13A'],
      '雪豹': ['Q3B','Q10B','Q20B'],
      '高山灵猫': ['Q3C','Q11B','Q18B'],
      '灰熊': ['Q3D','Q10A','Q18A'],
      '岩羊': ['Q1C','Q12A','Q17B'],
      '高山土拨鼠': ['Q6C','Q14A','Q20A']
    };

    const Q20_TIE = { A:'高山土拨鼠', B:'雪豹', C:'灰熊', D:'岩羊' };
    const ORDER = ['长臂猿','雪豹','高山灵猫','灰熊','岩羊','高山土拨鼠'];

    const state = {
      index: 0,
      answers: Array(QUESTIONS.length).fill(null),
      result: null,
      transitioning: false,
      sessionId: null
    };

    const introView = document.getElementById('introView');
    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');
    const questionShell = document.getElementById('questionShell');
    const progressLabel = document.getElementById('progressLabel');
    const progressBar = document.getElementById('progressBar');
    const progressHint = document.getElementById('progressHint');

    document.getElementById('startBtn').addEventListener('click', startQuiz);
    document.getElementById('viewRuleBtn').addEventListener('click', () => {
      alert('本版为 20 题、每题 4 选 1 的行为取向测试。每题所选选项会给对应动物 +1 分，最高分为主倾向。若最高分并列，则依次比较核心题命中数，再尝试用 Q20 决胜。');
    });
    document.getElementById('prevBtn').addEventListener('click', prevQuestion);
    document.getElementById('restartBtn').addEventListener('click', resetQuiz);
    document.getElementById('retestBtn').addEventListener('click', resetQuiz);
    document.getElementById('copyBtn').addEventListener('click', copySummary);

    init();

    function init() {
      state.sessionId = getSessionId();
      logVisitOnce();
    }

    function startQuiz() {
      introView.classList.add('hidden');
      resultView.classList.add('hidden');
      quizView.classList.remove('hidden');
      renderQuestion(true);
    }

    function resetQuiz() {
      state.index = 0;
      state.answers = Array(QUESTIONS.length).fill(null);
      state.result = null;
      state.transitioning = false;
      resultView.classList.add('hidden');
      quizView.classList.add('hidden');
      introView.classList.remove('hidden');
    }

    function prevQuestion() {
      if (state.transitioning || state.index === 0) return;
      state.index -= 1;
      renderQuestion();
    }

    function renderQuestion(firstPaint = false) {
      const q = QUESTIONS[state.index];
      progressLabel.textContent = `第 ${state.index + 1} / ${QUESTIONS.length} 题`;
      progressHint.textContent = '';
      progressBar.style.width = `${((state.index) / QUESTIONS.length) * 100}%`;

      const selected = state.answers[state.index];
      const card = document.createElement('div');
      card.className = 'question-card';
      if (!firstPaint) card.classList.add('entering');
      card.innerHTML = `
        <h2 class="question-title">${q.title}</h2>
        <div class="options">
          ${q.options.map(opt => `
            <button class="option ${selected === opt.key ? 'active' : ''}" data-key="${opt.key}">
              <span class="option-tag">${opt.key}</span>
              <span class="option-text">${opt.text}</span>
            </button>
          `).join('')}
        </div>
      `;
      card.querySelectorAll('.option').forEach(btn => {
        btn.addEventListener('click', () => selectOption(btn.dataset.key));
      });

      questionShell.innerHTML = '';
      questionShell.appendChild(card);
      document.getElementById('prevBtn').disabled = state.index === 0;

      if (!firstPaint) {
        requestAnimationFrame(() => {
          card.classList.add('enter-active');
        });
      }
    }

    function selectOption(key) {
      if (state.transitioning) return;
      state.answers[state.index] = key;
      const currentCard = questionShell.querySelector('.question-card');
      if (!currentCard) return;
      currentCard.querySelectorAll('.option').forEach(el => el.disabled = true);
      const active = currentCard.querySelector(`[data-key="${key}"]`);
      if (active) active.classList.add('active');

      if (state.index === QUESTIONS.length - 1) {
        state.transitioning = true;
        currentCard.classList.add('leaving');
        setTimeout(() => {
          finishQuiz();
          state.transitioning = false;
        }, 180);
        return;
      }

      state.transitioning = true;
      currentCard.classList.add('leaving');
      setTimeout(() => {
        state.index += 1;
        renderQuestion();
        state.transitioning = false;
      }, 180);
    }

    function finishQuiz() {
      const result = evaluate();
      state.result = result;
      quizView.classList.add('hidden');
      resultView.classList.remove('hidden');
      renderResult(result);
      logEvent('result', {
        sessionId: state.sessionId,
        siteName: CONFIG.siteName,
        timestamp: new Date().toISOString(),
        referrer: document.referrer || 'direct',
        screen: `${window.screen.width}x${window.screen.height}`,
        userAgent: navigator.userAgent,
        path: location.pathname,
        answers: QUESTIONS.map((q, i) => ({ questionId: q.id, answer: state.answers[i] })),
        result: {
          primaryType: result.primaryType,
          primaryScore: result.primaryScore,
          secondaryType: result.negativeType,
          secondaryScore: result.negativeScore,
          fitGap: result.fitGap,
          rawTypeScores: result.scores,
          tieState: result.tieState,
          primaryCandidates: result.primaryCandidates
        },
        rawScores: result.scores
      });
    }

    function evaluate() {
      const scores = Object.fromEntries(ORDER.map(name => [name, 0]));
      const picks = [];
      QUESTIONS.forEach((q, i) => {
        const ans = state.answers[i];
        if (!ans) return;
        const animal = MAPPING[q.id][ans];
        scores[animal] += 1;
        picks.push(q.id + ans);
      });

      const maxScore = Math.max(...Object.values(scores));
      let primaryCandidates = ORDER.filter(name => scores[name] === maxScore);
      let tieState = 'resolved';
      let primaryType = primaryCandidates[0];

      if (primaryCandidates.length > 1) {
        const coreHits = Object.fromEntries(primaryCandidates.map(name => [name, CORE_HITS[name].filter(code => picks.includes(code)).length]));
        const maxCore = Math.max(...Object.values(coreHits));
        const coreWinners = primaryCandidates.filter(name => coreHits[name] === maxCore);
        if (coreWinners.length === 1) {
          primaryType = coreWinners[0];
        } else {
          const q20 = state.answers[QUESTIONS.length - 1];
          const q20Winner = Q20_TIE[q20];
          if (q20Winner && coreWinners.includes(q20Winner)) {
            primaryType = q20Winner;
          } else {
            tieState = 'needs_confirmation';
            primaryCandidates = coreWinners;
            primaryType = coreWinners.join(' / ');
          }
        }
      }

      const minScore = Math.min(...Object.values(scores));
      let negativeCandidates = ORDER.filter(name => scores[name] === minScore);
      let negativeType = negativeCandidates[0];
      if (negativeCandidates.length > 1) {
        const coreHitsLow = Object.fromEntries(negativeCandidates.map(name => [name, CORE_HITS[name].filter(code => picks.includes(code)).length]));
        const minCore = Math.min(...Object.values(coreHitsLow));
        const lowCore = negativeCandidates.filter(name => coreHitsLow[name] === minCore);
        negativeType = lowCore[0];
      }

      const sortedScores = [...ORDER].sort((a,b) => scores[b] - scores[a]);
      const topResolved = tieState === 'resolved' ? primaryType : primaryCandidates[0];
      const secondCandidate = sortedScores.find(name => name !== topResolved) || sortedScores[1] || topResolved;
      return {
        primaryType,
        primaryScore: maxScore,
        primaryCandidates,
        negativeType,
        negativeScore: minScore,
        fitGap: scores[topResolved] - (scores[secondCandidate] ?? 0),
        tieState,
        scores
      };
    }

    function renderResult(result) {
      const unresolved = result.tieState === 'needs_confirmation';
      const primaryText = unresolved ? `你的主型介于 ${result.primaryCandidates.join(' 与 ')} 之间` : `你的主倾向是：${result.primaryType}`;
      document.getElementById('resultTitle').textContent = primaryText;
      document.getElementById('resultSummary').textContent = unresolved
        ? '按照最高分、核心题命中数与 Q20 仍无法完全区分，因此当前结果保留为双候选。'
        : '结果由 20 题累计得分得到；若出现并列，已按核心题命中数和 Q20 决胜规则处理。';

      const primaryDisplay = unresolved ? ANIMALS[result.primaryCandidates[0]] : ANIMALS[result.primaryType];
      document.getElementById('primaryName').textContent = unresolved ? result.primaryCandidates.join(' / ') : primaryDisplay.key;
      document.getElementById('primaryMeta').textContent = unresolved
        ? result.primaryCandidates.map(name => ANIMALS[name].subtitle).join(' ｜ ')
        : primaryDisplay.subtitle;
      document.getElementById('primaryDesc').textContent = unresolved
        ? result.primaryCandidates.map(name => `${name}：${ANIMALS[name].desc}`).join(' ')
        : primaryDisplay.desc;
      document.getElementById('primaryScoreLine').textContent = unresolved
        ? `并列最高分：${result.primaryScore} 分`
        : `累计得分：${result.primaryScore} / 20`;

      const negative = ANIMALS[result.negativeType];
      document.getElementById('negativeName').textContent = negative.key;
      document.getElementById('negativeMeta').textContent = negative.subtitle;
      document.getElementById('negativeDesc').textContent = `在当前这次作答中，你最少表现出的是这一类取向：${negative.desc} 这不代表你不能做到，而是说明它不是你最自然的默认模式。`;
      document.getElementById('negativeScoreLine').textContent = `累计得分：${result.negativeScore} / 20`;
    }

    function copySummary() {
      if (!state.result) return;
      const unresolved = state.result.tieState === 'needs_confirmation';
      const summary = unresolved
        ? `我在《探索你的攀岩灵魂》中的结果介于 ${state.result.primaryCandidates.join(' 与 ')} 之间；当前负倾向为 ${state.result.negativeType}。`
        : `我在《探索你的攀岩灵魂》中的主倾向是 ${state.result.primaryType}，负倾向是 ${state.result.negativeType}。`;
      navigator.clipboard.writeText(summary).then(() => {
        alert('结果摘要已复制。');
      }).catch(() => {
        alert('复制失败，请手动复制页面内容。');
      });
    }

    function getSessionId() {
      const key = 'climb_animal_quiz_session_id';
      const existing = localStorage.getItem(key);
      if (existing) return existing;
      const id = `sess_${Math.random().toString(36).slice(2)}_${Date.now()}`;
      localStorage.setItem(key, id);
      return id;
    }

    function logVisitOnce() {
      const key = 'climb_animal_quiz_last_visit_log';
      const last = Number(localStorage.getItem(key) || 0);
      const now = Date.now();
      const cooldown = CONFIG.visitCooldownHours * 60 * 60 * 1000;
      if (now - last < cooldown) return;
      localStorage.setItem(key, String(now));
      logEvent('visit', {
        sessionId: state.sessionId,
        siteName: CONFIG.siteName,
        timestamp: new Date().toISOString(),
        pageUrl: location.href,
        path: location.pathname,
        referrer: document.referrer || 'direct',
        screen: `${window.screen.width}x${window.screen.height}`,
        language: navigator.language,
        userAgent: navigator.userAgent
      });
    }

    function logEvent(eventType, payload) {
      if (!CONFIG.analyticsEndpoint) return;
      const body = JSON.stringify({ eventType, ...payload });
      const blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
      if (navigator.sendBeacon) {
        navigator.sendBeacon(CONFIG.analyticsEndpoint, blob);
        return;
      }
      fetch(CONFIG.analyticsEndpoint, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body
      }).catch(() => {});
    }
  </script>
