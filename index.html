<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>测试你的攀岩人格｜你是岩馆里的哪种动物？</title>
  <meta name="description" content="一个更专业的攀岩风格原型测试：用动物原型呈现你的攀爬风格。" />
  <style>
    :root {
      --bg1: #f7eddc;
      --bg2: #dceee6;
      --bg3: #f8dfd7;
      --ink: #22222a;
      --sub: #6d6a73;
      --orange: #ea7b26;
      --orange-dark: #d26715;
      --cream: #fffdf9;
      --line: rgba(34,34,42,.08);
      --shadow: 0 14px 30px rgba(87, 70, 40, .12);
      --r-xl: 28px;
      --r-lg: 22px;
      --r-md: 16px;
      --r-pill: 999px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", system-ui, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 14% 18%, rgba(255, 217, 153, .34) 0 4%, transparent 4.5%),
        radial-gradient(circle at 80% 14%, rgba(177, 227, 196, .38) 0 4.6%, transparent 5%),
        radial-gradient(circle at 18% 72%, rgba(255, 176, 176, .24) 0 5%, transparent 5.5%),
        radial-gradient(circle at 66% 42%, rgba(196, 217, 255, .30) 0 4%, transparent 4.5%),
        radial-gradient(circle at 90% 70%, rgba(255, 214, 145, .25) 0 4.2%, transparent 4.6%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg3) 46%, var(--bg2) 100%);
      background-attachment: fixed;
    }

    .page {
      min-height: 100vh;
      padding: 18px 14px 34px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 430px;
      min-height: calc(100vh - 36px);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .view { display: none; }
    .view.active { display: block; animation: fadeIn .35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      padding: 12px 8px 8px;
    }

    .emoji-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      font-size: clamp(28px, 8vw, 42px);
      margin: 12px 0 20px;
      flex-wrap: wrap;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,.08));
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(32px, 9vw, 54px);
      line-height: 1.12;
      letter-spacing: -.03em;
      font-weight: 900;
    }

    .accent { color: var(--orange); }

    .hero .subline {
      margin: 10px 0 0;
      font-size: clamp(18px, 4.6vw, 24px);
      font-weight: 700;
      color: #5f6875;
    }

    .hero .subline small {
      font-size: .85em;
      opacity: .86;
    }

    .start-btn, .nav-btn, .outline-btn, .share-btn {
      border: none;
      border-radius: var(--r-pill);
      padding: 16px 24px;
      font-size: 19px;
      font-weight: 900;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .start-btn, .share-btn {
      width: 100%;
      background: linear-gradient(180deg, #f28c2b 0%, var(--orange) 100%);
      color: #fff;
      box-shadow: 0 12px 24px rgba(234, 123, 38, .28);
    }

    .outline-btn, .nav-btn {
      background: rgba(255,255,255,.72);
      color: var(--ink);
      border: 1px solid rgba(34,34,42,.08);
      box-shadow: var(--shadow);
    }

    .start-btn:hover, .nav-btn:hover, .outline-btn:hover, .share-btn:hover {
      transform: translateY(-1px);
    }

    .meta {
      margin-top: 16px;
      text-align: center;
      color: var(--sub);
      font-size: 16px;
      font-weight: 600;
    }

    .tiny {
      margin-top: 14px;
      text-align: center;
      color: rgba(38, 38, 46, .56);
      font-size: 12px;
      line-height: 1.5;
    }

    .card {
      background: rgba(255,255,255,.76);
      backdrop-filter: blur(7px);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
    }

    .quiz-shell {
      padding: 18px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--r-pill);
      background: rgba(255,255,255,.75);
      border: 1px solid rgba(34,34,42,.08);
      color: #5c6170;
      font-size: 13px;
      font-weight: 800;
    }

    .dots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
      max-width: 180px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(34,34,42,.14);
      transition: all .22s ease;
    }

    .dot.done { background: var(--orange); transform: scale(1.05); }
    .dot.current { background: #ffbf83; transform: scale(1.2); }

    .question-card {
      padding: 22px 18px 18px;
    }

    .question-title {
      margin: 0 0 18px;
      font-size: 28px;
      line-height: 1.28;
      font-weight: 900;
      letter-spacing: -.02em;
    }

    .helper {
      margin: -8px 0 18px;
      color: var(--sub);
      font-size: 13px;
      font-weight: 700;
    }

    .option-list {
      display: grid;
      gap: 12px;
    }

    .option {
      width: 100%;
      display: flex;
      gap: 14px;
      align-items: flex-start;
      border: 1px solid rgba(34,34,42,.08);
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      padding: 15px 16px;
      cursor: pointer;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
      box-shadow: 0 6px 16px rgba(82, 70, 43, .05);
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: rgba(234,123,38,.35);
      box-shadow: 0 10px 22px rgba(234, 123, 38, .12);
    }

    .option.selected {
      background: #fff4e9;
      border-color: rgba(234,123,38,.52);
    }

    .badge {
      width: 34px;
      height: 34px;
      min-width: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: var(--orange-dark);
      background: #fff0df;
      border: 1px solid rgba(234,123,38,.16);
    }

    .option-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.48;
      font-weight: 700;
      color: #2d2f37;
    }

    .quiz-footer {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .quiz-footer > * { flex: 1; }

    .result-shell {
      padding: 12px 0 8px;
    }

    .result-main {
      padding: 22px 18px 18px;
      text-align: center;
    }

    .result-emoji {
      font-size: 58px;
      line-height: 1;
      margin-bottom: 10px;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.08));
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: var(--r-pill);
      background: #fff4e9;
      color: var(--orange-dark);
      font-size: 13px;
      font-weight: 900;
      border: 1px solid rgba(234,123,38,.16);
      margin-bottom: 10px;
    }

    .result-title {
      margin: 4px 0 6px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -.02em;
      font-weight: 900;
    }

    .result-subtitle {
      color: #5e6370;
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 10px;
    }

    .result-desc {
      margin: 0;
      font-size: 15px;
      line-height: 1.72;
      color: #535867;
      text-align: left;
    }

    .section-grid {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }

    .mini-card {
      padding: 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(34,34,42,.08);
      box-shadow: var(--shadow);
    }

    .mini-title {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 900;
    }

    .mini-card ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: #555b68;
      font-size: 14px;
      line-height: 1.55;
      font-weight: 600;
    }

    .score-board {
      margin-top: 12px;
      display: grid;
      gap: 10px;
      text-align: left;
    }

    .score-row {
      padding: 12px 12px 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(34,34,42,.08);
    }

    .score-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-weight: 900;
      font-size: 15px;
      margin-bottom: 10px;
    }

    .score-top span:last-child {
      font-size: 14px;
      color: #6b6f79;
      font-weight: 800;
    }

    .track {
      width: 100%;
      height: 12px;
      border-radius: var(--r-pill);
      background: #eef1f5;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.04);
    }

    .fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      transition: width .4s ease;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,.08);
    }

    .cta-stack {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .hide { display: none !important; }

    @media (max-width: 380px) {
      .question-title { font-size: 25px; }
      .hero h1 { font-size: 30px; }
      .option-text { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="phone">
      <section id="introView" class="view active hero">
        <div class="emoji-row">🐵 🐆 🦊 🐐 🐕 🦭</div>
        <h1>测试你的<br><span class="accent">攀岩人格</span></h1>
        <p class="subline">你是岩馆里的哪种动物？ <small>🧗</small></p>

        <div style="height: 18px"></div>
        <button id="startBtn" class="start-btn">开始测试 →</button>
        <div class="meta">10道题 · 2分钟 · 超准（大概）</div>
        <div class="tiny">
          这是一版更专业的攀岩风格原型测试。<br>
          外观按视频风格重构，分类逻辑则保留了更稳定的行为维度。
        </div>
      </section>

      <section id="quizView" class="view">
        <div class="quiz-shell card">
          <div class="topbar">
            <div class="counter" id="counterText">Q1 / 10</div>
            <div class="dots" id="dotsWrap"></div>
          </div>

          <div class="question-card">
            <h2 class="question-title" id="questionTitle"></h2>
            <div class="helper">选择最像你的那个反应。点击即自动下一题。</div>
            <div class="option-list" id="optionList"></div>
            <div class="quiz-footer">
              <button id="prevBtn" class="outline-btn">上一题</button>
              <button id="restartBtn" class="nav-btn">重新开始</button>
            </div>
          </div>
        </div>
      </section>

      <section id="resultView" class="view result-shell">
        <div class="card result-main">
          <div class="result-emoji" id="resultEmoji">🐆</div>
          <div class="pill" id="resultPill">你的攀岩动物原型</div>
          <h2 class="result-title" id="resultTitle"></h2>
          <div class="result-subtitle" id="resultSubtitle"></div>
          <p class="result-desc" id="resultDesc"></p>

          <div class="score-board" id="scoreBoard"></div>

          <div class="cta-stack">
            <button id="shareBtn" class="share-btn">复制结果摘要</button>
            <button id="retestBtn" class="outline-btn">再测一次</button>
          </div>
        </div>

        <div class="section-grid">
          <div class="mini-card">
            <h3 class="mini-title">你的优势场景</h3>
            <ul id="strengthList"></ul>
          </div>
          <div class="mini-card">
            <h3 class="mini-title">更像样的提升方向</h3>
            <ul id="adviceList"></ul>
          </div>
        </div>

        <div class="tiny">说明：本测试是攀岩风格原型，不是心理诊断工具。</div>
      </section>
    </main>
  </div>

  <script>
    const CONFIG = {
      analyticsEndpoint: "https://script.google.com/macros/s/AKfycbziDSM4ebxR2YQ0Hrj161XdAOCJ7TYbwZTFBKPZp1Mbu7j5nlKWYtL7bzeYh2Iz1J9t/exec",
      siteName: "climbing-animal-quiz",
      visitCooldownHours: 12
    };

    const QUESTIONS = [
      {
        title: "岩馆刚开出一条新线，你最可能：",
        options: [
          { key: "A", text: "第一个冲上去试试，先做再说。", scores: { execution: 2, power: 1, expressive: 1 } },
          { key: "B", text: "先看两个人怎么爬，再决定自己怎么上。", scores: { planning: 2, focus: 1 } },
          { key: "C", text: "在地上比划动作，先把 beta 想明白。", scores: { planning: 2, control: 1, focus: 1 } },
          { key: "D", text: "先热身，让身体和节奏先到位。", scores: { endurance: 2, coordination: 1 } }
        ]
      },
      {
        title: "遇到一个差一点够不到的手点时，你更常：",

          { key: "B", text: "借摆动或 deadpoint，把时机做出来。", scores: { coordination: 2, execution: 1 } },
          { key: "C", text: "强锁硬拉，直接狠狠干过去。", scores: { power: 2, execution: 1 } },
          { key: "D", text: "退一步重排整段节奏，争取更省力。", scores: { endurance: 2, planning: 1 } }
        ]
      },
      {
        title: "别人给你 beta 时，你通常会：",
        options: [
          { key: "A", text: "先听逻辑，再决定要不要照做。", scores: { planning: 2, focus: 1 } },
          { key: "B", text: "听个大概，上墙自己调成顺手版本。", scores: { execution: 2, coordination: 1 } },
          { key: "C", text: "只关心 crux 那一下怎么过。", scores: { power: 1, execution: 1, planning: 1 } },

          { key: "B", text: "大协调、切脚、dyno 很漂亮的那种。", scores: { coordination: 2, expressive: 1 } },
          { key: "C", text: "强度拉满、直接把 crux 干爆的片段。", scores: { power: 2, expressive: 1 } },
          { key: "D", text: "长线路一路稳定顺下来的那种。", scores: { endurance: 2, focus: 1 } }
        ]
      },
      {
        title: "第一次掉下来后，你最像哪一种反应：",
        options: [
          { key: "A", text: "回忆脚法和髋位，找细节误差。", scores: { planning: 2, control: 1 } },
          { key: "B", text: "马上再试一次，趁身体感觉还在。", scores: { execution: 2, coordination: 1 } },
          { key: "C", text: "再发狠一点，感觉就差一口力。", scores: { power: 2, execution: 1 } },
          { key: "D", text: "拆分整段，重排发力顺序和节奏。", scores: { endurance: 1, planning: 2 } }
        ]
      },
      {
        title: "在岩馆里，你更常被别人评价为：",
        options: [
          { key: "A", text: "动作很稳，很细。", scores: { control: 2, focus: 1 } },
          { key: "B", text: "很会飞，动作很有张力。", scores: { coordination: 2, expressive: 2 } },
          { key: "C", text: "力量好，敢硬解。", scores: { power: 2, execution: 1 } },
          { key: "D", text: "很能爬，节奏很稳。", scores: { endurance: 2, focus: 1 } }
        ]
      },
      {
        title: "你最不怕的题型往往是：",
        options: [
          { key: "A", text: "slab、垂壁、需要平衡和脚法的题。", scores: { control: 2, planning: 1 } },
          { key: "B", text: "协调题、比赛风格题。", scores: { coordination: 2, execution: 1 } },
          { key: "C", text: "大倾角、力量型 overhang。", scores: { power: 2, execution: 1 } },
          { key: "D", text: "长线路、持续段、要控泵的题。", scores: { endurance: 2, focus: 1 } }

      },
      {
        title: "如果一个动作有点吓人，你更可能：",
        options: [
          { key: "A", text: "先找有没有更稳的替代解。", scores: { planning: 2, control: 1, focus: 1 } },
          { key: "B", text: "时机到了就飞，犹豫更危险。", scores: { coordination: 2, execution: 2 } },
          { key: "C", text: "只要觉得能锁住，我就会直接上。", scores: { power: 2, execution: 1 } },
          { key: "D", text: "先算体力账，再决定值不值得赌。", scores: { endurance: 1, planning: 2 } }
        ]
      },
      {
        title: "你更接近哪种训练状态：",
        options: [
          { key: "A", text: "喜欢磨动作，把解法做漂亮。", scores: { control: 2, focus: 1 } },
          { key: "B", text: "喜欢上墙试，边做边改。", scores: { execution: 2, coordination: 1 } },
          { key: "C", text: "喜欢冲强度，盯 hardest move。", scores: { power: 2, expressive: 1 } },

    const RESULT_TYPES = {
      gorilla: {
        emoji: "🦍",

        subtitle: "爆发硬解型",
        color: "linear-gradient(90deg,#7256ff,#5b41dc)",

      seal: {
        emoji: "🦭",
        name: "海豹",
        subtitle: "节奏续航型",
        color: "linear-gradient(90deg,#f0b113,#db9d00)",
        description: "你像海豹。你会找节奏，会控泵，会在线路里保持连续输出。你不一定是最炸裂的那个，但经常是最稳、最能爬、最不容易乱的人。长线路和持续段通常是你的舒适区。",
        strengths: ["续航和节奏感好", "长线路、持续段、容量训练更占优", "整体输出稳定，后程不容易崩"],
        advice: ["短 crux 爆发能力需要专门补", "别一味追求稳，有时要敢于提高攻击性", "可以把长线路拆成强度段训练切换能力"]
      },
      goat: {
        emoji: "🐐",
        name: "山羊",
        subtitle: "平衡脚法型",
        color: "linear-gradient(90deg,#2d94ff,#1779e2)",
        description: "你像山羊。你对脚点、身体堆叠和平衡很敏感，面对需要小心放脚、稳步推进和不断修正重心的线路时，你往往会比别人更快进入解题状态。",
        strengths: ["平衡、脚法、重心管理能力强", "slab 和技术垂壁适应性高", "对细碎线路的容错理解更成熟"],
        advice: ["主动练一点爆发与动态承诺", "别在可飞的动作上反复犹豫", "技术优先没错，但别放弃力量上限建设"]
      },
      fox: {
        emoji: "🦊",
        name: "狐狸",
        subtitle: "Beta策划型",
        color: "linear-gradient(90deg,#ff7d5e,#ef5d3f)",
        description: "你像狐狸。你不是不敢上墙，而是习惯先想清楚再上墙。你擅长读线、拆动作、理解 beta 逻辑，也更愿意把一次失败变成下一次的有效修正。你属于那种‘脑子先爬完一遍’的人。",
        strengths: ["读线效率高，flash 潜力好", "失败后修正速度快", "复杂线路和项目型尝试更有优势"],
        advice: ["别分析过度，把需要勇气的动作一直留在脑内", "给自己设限时读线，缩短决策窗口", "规划强不等于执行强，记得上墙验证"]
      },
      sloth: {
        emoji: "🦥",
        name: "树懒",
        subtitle: "佛系体验型",
        color: "linear-gradient(90deg,#8c9897,#677272)",
        description: "你像树懒。你不太迷恋一上来就狠狠干，反而更在意舒服、顺、可持续。你享受攀岩带来的专注和节奏感，也更容易用自己的方式慢慢推进。你未必最卷，但常常最稳定、最能长期待在这项运动里。",
        strengths: ["压力感低，训练可持续性好", "更容易建立自己的稳定节奏", "不容易被一时成绩绑架"],
        advice: ["别太佛，周期里要有明确目标点", "刻意加入几次高强度冲击，提升上限刺激", "偶尔需要逼自己离开舒适圈"]
      },
      collie: {
        emoji: "🐕",
        name: "边牧",
        subtitle: "自律成长型",
        color: "linear-gradient(90deg,#ff4ea7,#d42a82)",
        description: "你像边牧。你对训练、复盘、节奏和进步都很敏感，往往不是靠单次爆种赢，而是靠持续执行把自己一点点做强。你在系统训练、项目推进和长期成长上通常非常有优势。",
        strengths: ["执行力和训练自律性高", "长期进步曲线更平稳", "更愿意做复盘、做记录、做修正"],
        advice: ["别把自己练成只会执行计划的人，要保留临场灵活性", "偶尔允许自己更野一点、更玩一点", "注意恢复，不要把每次训练都做成作业"]
      }
    };

    const TYPE_FORMULAS = {
      gorilla: { power: 0.46, execution: 0.24, expressive: 0.12, coordination: 0.10, planning: 0.08 },
      snowLeopard: { control: 0.38, focus: 0.20, planning: 0.18, endurance: 0.14, coordination: 0.10 },
      seal: { endurance: 0.40, focus: 0.18, coordination: 0.16, planning: 0.14, expressive: 0.12 },
      goat: { control: 0.34, planning: 0.22, focus: 0.18, endurance: 0.16, coordination: 0.10 },
      fox: { planning: 0.44, focus: 0.18, control: 0.14, execution: 0.14, endurance: 0.10 },
      sloth: { focus: 0.28, endurance: 0.28, planning: 0.16, control: 0.12, expressive: 0.08, execution: 0.08 },
      collie: { planning: 0.28, execution: 0.24, focus: 0.18, endurance: 0.14, control: 0.08, coordination: 0.08 }
    };

    const state = {
      current: 0,
      answers: Array(QUESTIONS.length).fill(null),
      result: null,
      scores: null,
      sessionId: getSessionId()
    };

    const introView = document.getElementById('introView');
    const quizView = document.getElementById('quizView');
    const resultView = document.getElementById('resultView');
    const counterText = document.getElementById('counterText');
    const dotsWrap = document.getElementById('dotsWrap');
    const questionTitle = document.getElementById('questionTitle');
    const optionList = document.getElementById('optionList');

    document.getElementById('startBtn').addEventListener('click', startQuiz);
    document.getElementById('prevBtn').addEventListener('click', goPrev);
    document.getElementById('restartBtn').addEventListener('click', resetQuiz);
    document.getElementById('retestBtn').addEventListener('click', resetQuiz);
    document.getElementById('shareBtn').addEventListener('click', copySummary);

    document.addEventListener('DOMContentLoaded', () => {
      logVisitOnce();
      renderDots();
    });

    function startQuiz() {
      setActive('quiz');
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function setActive(view) {
      introView.classList.toggle('active', view === 'intro');
      quizView.classList.toggle('active', view === 'quiz');
      resultView.classList.toggle('active', view === 'result');
    }

    function renderDots() {
      dotsWrap.innerHTML = '';
      QUESTIONS.forEach((_, idx) => {
        const d = document.createElement('span');
        d.className = 'dot';
        if (state.answers[idx]) d.classList.add('done');
        if (idx === state.current && !state.result) d.classList.add('current');
        dotsWrap.appendChild(d);
      });
    }

    function renderQuestion() {
      const q = QUESTIONS[state.current];
      counterText.textContent = `Q${state.current + 1} / ${QUESTIONS.length}`;
      questionTitle.textContent = q.title;
      optionList.innerHTML = '';

      q.options.forEach(option => {
        const btn = document.createElement('button');
        btn.className = 'option';
        const saved = state.answers[state.current];
        if (saved && saved.optionKey === option.key) btn.classList.add('selected');
        btn.innerHTML = `<span class="badge">${option.key}</span><span class="option-text">${option.text}</span>`;
        btn.addEventListener('click', () => selectOption(option));
        optionList.appendChild(btn);
      });

      renderDots();
    }

    function selectOption(option) {
      state.answers[state.current] = {
        questionIndex: state.current,
        optionKey: option.key,
        text: option.text,
        scores: option.scores
      };

      if (state.current < QUESTIONS.length - 1) {
        state.current += 1;
        renderQuestion();
      } else {
        calculateResult();
        renderResult();
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function goPrev() {
      if (state.current === 0) return;
      state.current -= 1;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function calculateResult() {
      const totals = { control: 0, coordination: 0, power: 0, endurance: 0, planning: 0, execution: 0, focus: 0, expressive: 0 };
      state.answers.forEach(a => {
        Object.entries(a.scores).forEach(([k, v]) => totals[k] += v);
      });

      const raw = Object.entries(TYPE_FORMULAS).map(([typeKey, formula]) => {
        const score = Object.entries(formula).reduce((sum, [k, weight]) => sum + (totals[k] || 0) * weight, 0);
        return { typeKey, score: round(score) };
      }).sort((a, b) => b.score - a.score);

      state.scores = totals;
      state.result = {
        primaryType: raw[0].typeKey,
        secondaryType: raw[1].typeKey,
        rawTypeScores: raw,
        fitGap: round(raw[0].score - raw[1].score)
      };

      logEvent('result', {
        sessionId: state.sessionId,
        siteName: CONFIG.siteName,
        answers: state.answers.map((a, idx) => ({ question: idx + 1, optionKey: a.optionKey, text: a.text })),
        rawScores: state.scores,
        result: {
          primaryType: state.result.primaryType,
          primaryScore: raw[0].score,
          secondaryType: state.result.secondaryType,
          secondaryScore: raw[1].score,
          fitGap: state.result.fitGap,
          rawTypeScores: raw
        },
        referrer: document.referrer || 'direct',
        screen: `${window.screen.width}x${window.screen.height}`,
        userAgent: navigator.userAgent,
        path: location.pathname,
        timestamp: new Date().toISOString()
      });
    }

    function renderResult() {
      const primary = RESULT_TYPES[state.result.primaryType];
      const secondary = RESULT_TYPES[state.result.secondaryType];

      document.getElementById('resultEmoji').textContent = primary.emoji;
      document.getElementById('resultTitle').textContent = `${primary.name} · ${primary.subtitle}`;
      document.getElementById('resultSubtitle').textContent = `副型偏向：${secondary.name} · ${secondary.subtitle}`;
      document.getElementById('resultDesc').textContent = primary.description;
      fillList('strengthList', primary.strengths);
      fillList('adviceList', primary.advice);
      renderScoreBoard();

      setActive('result');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderScoreBoard() {
      const board = document.getElementById('scoreBoard');
      const max = Math.max(...state.result.rawTypeScores.map(x => x.score), 1);
      board.innerHTML = '';
      state.result.rawTypeScores.forEach(item => {
        const type = RESULT_TYPES[item.typeKey];
        const percent = Math.max(4, (item.score / max) * 100);
        const row = document.createElement('div');
        row.className = 'score-row';
        row.innerHTML = `
          <div class="score-top">
            <span>${type.emoji} ${type.name}</span>
            <span>${item.score}</span>
          </div>
          <div class="track"><div class="fill" style="width:${percent}%; background:${type.color}"></div></div>
        `;
        board.appendChild(row);
      });
    }

    function fillList(id, items) {
      document.getElementById(id).innerHTML = items.map(x => `<li>${x}</li>`).join('');
    }

    function resetQuiz() {
      state.current = 0;
      state.answers = Array(QUESTIONS.length).fill(null);
      state.result = null;
      state.scores = null;
      renderDots();
      setActive('intro');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copySummary() {
      if (!state.result) return;
      const primary = RESULT_TYPES[state.result.primaryType];
      const secondary = RESULT_TYPES[state.result.secondaryType];
      const text = `我测出来的攀岩动物原型是：${primary.name}（${primary.subtitle}），副型是 ${secondary.name}（${secondary.subtitle}）。`;
      navigator.clipboard.writeText(text).then(() => {
        alert('结果摘要已复制。');
      }).catch(() => {
        alert('复制失败，请手动复制。');
      });
    }

    function getSessionId() {
      const key = 'climb_animal_quiz_session_id';
      const existing = localStorage.getItem(key);
      if (existing) return existing;
      const value = `sess_${Math.random().toString(36).slice(2)}_${Date.now()}`;
      localStorage.setItem(key, value);
      return value;
    }

    function logVisitOnce() {
      const key = 'climb_animal_quiz_last_visit';
      const last = Number(localStorage.getItem(key) || 0);
      const now = Date.now();
      const cooldown = CONFIG.visitCooldownHours * 3600 * 1000;
      if (now - last < cooldown) return;
      localStorage.setItem(key, String(now));

      logEvent('visit', {
        sessionId: state.sessionId,
        siteName: CONFIG.siteName,
        timestamp: new Date().toISOString(),
        pageUrl: location.href,
        path: location.pathname,
        referrer: document.referrer || 'direct',
        screen: `${window.screen.width}x${window.screen.height}`,
        language: navigator.language,
        userAgent: navigator.userAgent
      });
    }

    function logEvent(eventType, payload) {
      if (!CONFIG.analyticsEndpoint) return;
      const body = JSON.stringify({ eventType, ...payload });
      const blob = new Blob([body], { type: 'text/plain;charset=UTF-8' });
      if (navigator.sendBeacon) {
        navigator.sendBeacon(CONFIG.analyticsEndpoint, blob);
        return;
      }
      fetch(CONFIG.analyticsEndpoint, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=UTF-8' },
        body
      }).catch(() => {});
    }

    function round(n) {
      return Math.round(n * 100) / 100;
    }
  </script>
