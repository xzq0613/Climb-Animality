<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>攀岩动物测试｜统计页</title>
  <style>
    body { font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; background:#fff; color:#221b17; margin:0; }
    .wrap { max-width: 900px; margin:0 auto; padding: 28px 16px 40px; }
    .panel { border:1px solid #ece7df; border-radius:24px; box-shadow:0 10px 30px rgba(80,52,22,.06); padding:24px; }
    h1 { margin:0 0 10px; font-size: 32px; }
    .muted { color:#78695d; }
    .stats { display:grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-top:18px; }
    .card { border:1px solid #ece7df; border-radius:18px; padding:16px; }
    .n { font-size:28px; font-weight:800; }
    .bars { display:grid; gap:12px; margin-top:18px; }
    .row { display:grid; gap:6px; }
    .top { display:flex; justify-content:space-between; gap:12px; font-size:14px; }
    .track { height:10px; background:#f4eee6; border-radius:999px; overflow:hidden; }
    .fill { height:100%; background:linear-gradient(90deg,#c95a1d,#ef8f39); width:0; }
    @media (max-width:720px){ .stats { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>攀岩动物测试统计页</h1>
      <div class="muted" id="updatedAt">加载中…</div>
      <div class="stats">
        <div class="card"><div class="muted">访问量</div><div class="n" id="visits">0</div></div>
        <div class="card"><div class="muted">完成量</div><div class="n" id="completions">0</div></div>
        <div class="card"><div class="muted">完成率</div><div class="n" id="rate">0%</div></div>
        <div class="card"><div class="muted">待确认并列</div><div class="n" id="unresolved">0</div></div>
      </div>
      <div class="bars" id="bars"></div>
    </div>
  </div>
  <script>
    const SUMMARY_URL = 'https://script.google.com/macros/s/AKfycbziDSM4ebxR2YQ0Hrj161XdAOCJ7TYbwZTFBKPZp1Mbu7j5nlKWYtL7bzeYh2Iz1J9t/exec';
    async function load() {
      const res = await fetch(SUMMARY_URL);
      const data = await res.json();
      document.getElementById('visits').textContent = data.visits || 0;
      document.getElementById('completions').textContent = data.completions || 0;
      document.getElementById('rate').textContent = `${data.completionRate || 0}%`;
      document.getElementById('unresolved').textContent = data.unresolvedCount || 0;
      document.getElementById('updatedAt').textContent = `更新时间：${data.updatedAt || ''}`;
      const bars = document.getElementById('bars');
      bars.innerHTML = (data.breakdown || []).map(item => `
        <div class="row">
          <div class="top"><span>${item.typeKey}</span><span>${item.count} 人 · ${item.percent}%</span></div>
          <div class="track"><div class="fill" style="width:${item.percent}%"></div></div>
        </div>
      `).join('');
    }
    load().catch(err => {
      document.getElementById('updatedAt').textContent = '加载失败：' + err;
    });
  </script>
</body>
</html>
